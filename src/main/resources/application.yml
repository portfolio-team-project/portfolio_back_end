# =============================================================
# 애플리케이션 설정 파일
# =============================================================

server:
  port: 80

spring:
  application:
    name: portfolio_project
  config:
    import: optional:file:src/.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN}

jwt:
  secret: ${JWT_SECRET}
  
logging:
  file:
    path: /var/was_home/logs