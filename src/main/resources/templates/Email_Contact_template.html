<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:'Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;">

          <!-- Header -->
          <tr>
            <td style="background:#111111;padding:32px 40px;">
              <p style="margin:0;color:#ffffff;font-size:11px;letter-spacing:4px;">PORTFOLIO</p>
              <p style="margin:8px 0 0;color:#ffffff;font-size:22px;font-weight:700;letter-spacing:2px;">NEW MESSAGE</p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px;">
              <p style="margin:0 0 8px;font-size:13px;color:#999999;letter-spacing:1px;">TO</p>
              <p style="margin:0 0 32px;font-size:18px;font-weight:700;color:#111111;">{{recipientName}} 님</p>

              <table width="100%" cellpadding="0" cellspacing="0" style="background:#f8f8f8;border-radius:6px;padding:24px;margin-bottom:32px;">
                <tr>
                  <td>
                    <p style="margin:0 0 4px;font-size:11px;color:#999999;letter-spacing:1px;">FROM</p>
                    <p style="margin:0 0 16px;font-size:15px;color:#111111;font-weight:600;">{{fromName}}</p>
                    <p style="margin:0 0 4px;font-size:11px;color:#999999;letter-spacing:1px;">EMAIL</p>
                    <p style="margin:0;font-size:15px;color:#111111;">{{fromEmail}}</p>
                  </td>
                </tr>
              </table>

              <p style="margin:0 0 12px;font-size:11px;color:#999999;letter-spacing:1px;">MESSAGE</p>
              <p style="margin:0;font-size:15px;color:#333333;line-height:1.8;white-space:pre-line;">{{messageBody}}</p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f8f8f8;padding:24px 40px;border-top:1px solid #eeeeee;">
              <p style="margin:0;font-size:11px;color:#bbbbbb;letter-spacing:1px;">© 2026 JI SANGWON × LEE EUIGWANG</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
